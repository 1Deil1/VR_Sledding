<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Sled Controller</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0a0a1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1.5rem;
      gap: 1rem;
    }

    h1  { font-size: 2rem; }
    p   { color: #aaa; font-size: 0.95rem; text-align: center; }

    #status {
      font-size: 1rem;
      font-weight: bold;
      color: #f0a;
      min-height: 1.5rem;
      white-space: pre-line;
      text-align: center;
      max-width: 320px;
      line-height: 1.5;
    }

    #values {
      font-size: 1rem;
      color: #7df;
      min-height: 1.5rem;
      letter-spacing: 0.05em;
    }

    #ipInput {
      padding: 0.6rem 1rem;
      font-size: 1rem;
      border-radius: 8px;
      border: 2px solid #444;
      background: #111;
      color: #fff;
      width: 100%;
      max-width: 260px;
      text-align: center;
    }

    button {
      padding: 1rem 2.5rem;
      font-size: 1.1rem;
      border: none;
      border-radius: 12px;
      background: #3af;
      color: #000;
      cursor: pointer;
      font-weight: bold;
      touch-action: manipulation;
    }
    button:active { filter: brightness(0.85); }

    #tiltViz {
      width: 120px;
      height: 120px;
      border: 2px solid #333;
      border-radius: 50%;
      position: relative;
      margin-top: 0.5rem;
    }
    #dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #3af;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: top 0.05s, left 0.05s;
    }
  </style>
</head>
<body>
  <h1>🛷 Sled Controller</h1>
  <p>Enter the IP shown in the game, then tap <strong>Connect</strong>.</p>

  <input id="ipInput" type="text" inputmode="decimal"
         placeholder="192.168.x.x" autocomplete="off" />

  <div id="status">Not connected</div>

  <button id="connectBtn" onclick="connect()">Connect &amp; Start</button>

  <div id="values">Pitch: 0.0° | Roll: 0.0°</div>

  <!-- Simple tilt visualiser -->
  <div id="tiltViz"><div id="dot"></div></div>

  <script>
    "use strict";

    let ws      = null;
    let sending = false;

    // ── Connect ──────────────────────────────────────────────────────────────
    function connect() {
      const ip = document.getElementById("ipInput").value.trim();
      if (!ip) { alert("Please enter the game IP address."); return; }

      // iOS 13+ requires explicit permission for DeviceOrientation
      if (typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function") {
        DeviceOrientationEvent.requestPermission()
          .then(state => {
            if (state === "granted") openWebSocket(ip);
            else alert("Motion permission denied.\nEnable it in: Settings › Safari › Motion & Orientation Access.");
          })
          .catch(console.error);
      } else {
        openWebSocket(ip);
      }
    }

    function openWebSocket(ip) {
      const wsUrl = "ws://" + ip + ":8080";
      setStatus("Connecting to " + wsUrl + " …", "#fa0");

      // Always connect via plain WebSocket (ws://) on port 8080.
      // iPhone: open this file from the Files app via Share → Open in Safari
      //         so it runs as file:// (a secure context).
      ws = new WebSocket(wsUrl);

      // Timeout: if onopen hasn't fired after 5 s, show a helpful message.
      let connTimeout = setTimeout(() => {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          ws && ws.close();
          setStatus(
            "⏱ Timed out connecting to " + wsUrl +
            ".\n• Is Unity running?\n• Correct IP?\n" +
            "• iPhone: Settings › Privacy › Local Network → allow Safari",
            "#fa0"
          );
        }
      }, 5000);

      ws.onopen = () => {
        clearTimeout(connTimeout);
        setStatus("✅ Connected!", "#0f0");
        sending = true;
        window.addEventListener("deviceorientation", onOrientation, { passive: true });
      };

      ws.onclose = (e) => {
        clearTimeout(connTimeout);
        setStatus("❌ Disconnected (code " + e.code + ")", "#f44");
        sending = false;
        window.removeEventListener("deviceorientation", onOrientation);
      };

      ws.onerror = () => {
        clearTimeout(connTimeout);
        setStatus(
          "⚠️ Error connecting to " + wsUrl +
          ".\nCheck IP, Unity running, and Local Network permission.",
          "#fa0"
        );
      };
    }

    // ── Tilt event ───────────────────────────────────────────────────────────
    function onOrientation(event) {
      if (!sending || !ws || ws.readyState !== WebSocket.OPEN) return;

      // beta  = pitch (forward/back tilt, −180..180, 0 = flat)
      // gamma = roll  (left/right tilt,   −90..90,   0 = flat)
      const pitch = event.beta  ?? 0;
      const roll  = event.gamma ?? 0;

      document.getElementById("values").textContent =
        "Pitch: " + pitch.toFixed(1) + "°  |  Roll: " + roll.toFixed(1) + "°";

      // Move visualiser dot
      const radius = 50; // px
      const dotX   = 50 + (roll  / 90)  * radius;
      const dotY   = 50 - (pitch / 180) * radius;
      const dot    = document.getElementById("dot");
      dot.style.left = dotX + "%";
      dot.style.top  = dotY + "%";

      ws.send(JSON.stringify({ pitch, roll }));
    }

    // ── Helpers ──────────────────────────────────────────────────────────────
    function setStatus(msg, color) {
      const el   = document.getElementById("status");
      el.textContent = msg;
      el.style.color = color || "#fff";
    }

    // Pre-fill IP from URL parameter ?ip=192.168.x.x (convenience for QR codes)
    const params = new URLSearchParams(window.location.search);
    if (params.get("ip")) {
      document.getElementById("ipInput").value = params.get("ip");
    }
  </script>
</body>
</html>
