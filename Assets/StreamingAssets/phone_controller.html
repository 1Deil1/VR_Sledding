<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Sled Controller</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0a0a1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1.5rem;
      gap: 1.2rem;
    }
    h1 { font-size: 2rem; }
    p  { color: #aaa; font-size: 0.9rem; text-align: center; max-width: 300px; }
    #status {
      font-size: 1rem; font-weight: bold; color: #fa0;
      text-align: center; max-width: 320px; line-height: 1.5; min-height: 2rem;
    }
    #values { font-size: 1rem; color: #7df; letter-spacing: 0.05em; }
    button {
      padding: 1rem 2.5rem; font-size: 1.1rem;
      border: none; border-radius: 12px;
      background: #3af; color: #000;
      cursor: pointer; font-weight: bold;
      touch-action: manipulation;
    }
    button:active { filter: brightness(0.85); }
    #tiltViz {
      width: 120px; height: 120px;
      border: 2px solid #333; border-radius: 50%;
      position: relative; margin-top: 0.5rem;
    }
    #dot {
      width: 20px; height: 20px; border-radius: 50%;
      background: #3af; position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      transition: top 0.05s, left 0.05s;
    }
  </style>
</head>
<body>
  <h1>&#x1f6f7; Sled Controller</h1>
  <div id="status">Connecting to relay...</div>
  <button id="connectBtn" onclick="requestPermission()" style="display:none">
    Tap to Enable Motion
  </button>
  <div id="values">Pitch: 0.0&deg; | Roll: 0.0&deg;</div>
  <div id="tiltViz"><div id="dot"></div></div>

  <div id="debug" style="font-size:0.7rem;color:#666;max-width:320px;word-break:break-all;margin-top:0.5rem;text-align:center"></div>

  <script>
    "use strict";

    const params   = new URLSearchParams(window.location.search);
    const relayUrl = params.get("relay");
    const debugEl  = document.getElementById("debug");

    let ws = null;
    let sending = false;
    let connectTimer = null;

    if (!relayUrl) {
      setStatus("\u26a0\ufe0f No relay URL provided.\nAsk the game host for the correct QR code.", "#f44");
    } else {
      debugEl.textContent = "Relay: " + relayUrl;
      connectToRelay(relayUrl);
    }

    function connectToRelay(url) {
      setStatus("Connecting to relay...", "#fa0");

      // First test HTTP connectivity to the relay
      const httpUrl = url.replace("wss://", "https://").replace("ws://", "http://") + "/ping";
      fetch(httpUrl, { mode: "cors" })
        .then(r => r.text())
        .then(t => { debugEl.textContent = "Relay: " + url + " | ping: " + t; })
        .catch(e => { debugEl.textContent = "Relay: " + url + " | ping failed: " + e.message; });

      try {
        ws = new WebSocket(url);
      } catch (e) {
        setStatus("\u26a0\ufe0f WebSocket creation failed: " + e.message, "#f44");
        return;
      }

      // Timeout: if no onopen/onerror/onclose within 10s, something is wrong
      connectTimer = setTimeout(() => {
        if (ws && ws.readyState === WebSocket.CONNECTING) {
          setStatus("\u26a0\ufe0f Connection timed out.\nRelay may be unreachable. Retrying...", "#f44");
          ws.close();
          setTimeout(() => connectToRelay(url), 3000);
        }
      }, 10000);

      ws.onopen = () => {
        clearTimeout(connectTimer);
        ws.send(JSON.stringify({ type: "register", role: "phone" }));
        setStatus("\u2705 Relay connected!\nTap button to enable motion.", "#0f0");
        document.getElementById("connectBtn").style.display = "block";
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === "status") {
            if (msg.gameConnected) {
              setStatus("\ud83c\udfae Game connected! Start leaning.", "#0f0");
            } else {
              setStatus("\u23f3 Waiting for game to connect...", "#fa0");
            }
          }
        } catch {}
      };

      ws.onclose = (ev) => {
        clearTimeout(connectTimer);
        setStatus("\u274c Disconnected (code: " + ev.code + "). Retrying in 3s...", "#f44");
        sending = false;
        setTimeout(() => connectToRelay(url), 3000);
      };

      ws.onerror = () => {
        clearTimeout(connectTimer);
        setStatus("\u26a0\ufe0f Connection error. Retrying in 3s...", "#f44");
        // onclose will also fire after onerror, which handles retry
      };
    }

    function requestPermission() {
      if (typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function") {
        DeviceOrientationEvent.requestPermission()
          .then(state => {
            if (state === "granted") startSending();
            else setStatus("\u274c Motion permission denied.\nSettings \u203a Safari \u203a Motion & Orientation Access", "#f44");
          }).catch(console.error);
      } else {
        startSending();
      }
    }

    function startSending() {
      sending = true;
      document.getElementById("connectBtn").style.display = "none";
      setStatus("\ud83c\udfae Sending tilt data!", "#0f0");
      window.addEventListener("deviceorientation", onOrientation, { passive: true });
    }

    function onOrientation(event) {
      if (!sending || !ws || ws.readyState !== WebSocket.OPEN) return;
      const pitch = event.beta  ?? 0;
      const roll  = event.gamma ?? 0;
      document.getElementById("values").textContent =
        "Pitch: " + pitch.toFixed(1) + "\u00b0  |  Roll: " + roll.toFixed(1) + "\u00b0";
      const dot = document.getElementById("dot");
      dot.style.left = (50 + (roll / 90) * 50) + "%";
      dot.style.top  = (50 - (pitch / 180) * 50) + "%";
      ws.send(JSON.stringify({ pitch, roll }));
    }

    function setStatus(msg, color) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.style.color = color || "#fff";
    }
  </script>
</body>
</html>
